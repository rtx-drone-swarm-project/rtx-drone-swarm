<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTX Capstone Links</title>
    <style>
      :root {
        --bg: #f7f9fc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0b5fff;
        --border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, #eef4ff 0%, var(--bg) 40%);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 60px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
        line-height: 1.2;
        font-family: "League Spartan", "Montserrat", "Segoe UI", sans-serif;
      }

      p.subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      h2 {
        margin: 24px 0 10px;
        font-size: 1.2rem;
        font-family: "League Spartan", "Montserrat", "Segoe UI", sans-serif;
      }

      .links {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      a.link {
        display: block;
        text-decoration: none;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        font-weight: 600;
        transition: 120ms ease;
      }

      a.link:hover {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(11, 95, 255, 0.12);
      }

      .muted {
        margin-top: 22px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .accent {
        color: var(--accent);
      }

      @media (max-width: 520px) {
        .card {
          padding: 20px;
        }

        h1 {
          font-size: 1.7rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>RTX: AI Drone Swarm (CS 08)</h1>
        <p class="subtitle">Scan destination for repository, team, demo, and report resources.</p>

        <h2>Project</h2>
        <div class="links">
          <a class="link" href="https://github.com/rtx-drone-swarm-project/rtx-drone-swarm" target="_blank" rel="noopener noreferrer">GitHub Repository</a>
          <a class="link" href="https://example.com/demo-video" target="_blank" rel="noopener noreferrer">Demo Video</a>
          <a class="link" href="https://canva.link/nt1h3q7vzv2w95t" target="_blank" rel="noopener noreferrer">Poster PDF</a>
        </div>

        <h2>Team LinkedIn</h2>
        <div class="links">
          <a class="link" href="https://www.linkedin.com/in/madisonmlin" target="_blank" rel="noopener noreferrer">Madison Lin</a>
          <a class="link" href="https://www.linkedin.com/in/ian-tang" target="_blank" rel="noopener noreferrer">Ian Tang</a>
          <a class="link" href="https://www.linkedin.com/in/lawrence-tam-800375294/" target="_blank" rel="noopener noreferrer">Lawrence Tam</a>
          <a class="link" href="https://www.linkedin.com/in/leogutz/" target="_blank" rel="noopener noreferrer">Leonardo Gutierrez</a>
          <a class="link" href="https://www.linkedin.com/in/kaydee-reyes" target="_blank" rel="noopener noreferrer">Kaydee Reyes</a>
        </div>
        
      </section>
    </main>
  </body>
</html>
